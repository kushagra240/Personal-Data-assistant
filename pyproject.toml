[tool.ruff]
target-version = "py310"
line-length = 120

exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "data",
    "chroma_db"
]

[tool.ruff.lint]
# Enable Pyflakes (F), Pycodestyle (E, W), and Isort (I)
select = [
    "F",    # Pyflakes
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "I",    # isort
]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["app"]
